<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Data Engineer - Workday Co</title></head>
<body>
  <h1>Data Engineer</h1>
  <a role="link" href="#">View job details</a>
  <button type="button">Apply</button>
  <form>
    <label>First Name<input aria-label="First Name" /></label>
    <label>Last Name<input aria-label="Last Name" /></label>
    <label>Email<input aria-label="Email" /></label>
    <label>Work Experience<textarea aria-label="Work Experience"></textarea></label>
    <label>Resume<input type="file" aria-label="Resume" accept=".pdf" /></label>
    <button type="submit">Finish</button>
  </form>
</body>
</html>
