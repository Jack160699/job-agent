<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Backend Engineer - Lever Co</title></head>
<body>
  <h1>Backend Engineer</h1>
  <button type="button">Apply</button>
  <form>
    <label>First Name<input aria-label="First Name" /></label>
    <label>Last Name<input aria-label="Last Name" /></label>
    <label>Email<input aria-label="Email" type="email" /></label>
    <label>Phone<input aria-label="Phone" /></label>
    <label>Additional information<textarea aria-label="Additional information"></textarea></label>
    <label>Will you require sponsorship?<select aria-label="sponsorship"><option>No</option><option>Yes</option></select></label>
    <input type="file" aria-label="Resume upload" accept=".pdf" />
    <button type="submit">Submit application</button>
  </form>
</body>
</html>
