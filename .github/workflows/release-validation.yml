name: Release Validation

on:
  push:
    branches:
      - feat/kairela-platform-completion
      - feat/kairela-product-v1
  pull_request:
    branches:
      - master
      - feat/kairela-product-v1

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kairela_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kairela_test
      ENCRYPTION_KEY: ci-test-encryption-key-32chars-min!!
      OAUTH_STATE_SECRET: ci-test-oauth-state-secret-32chars!!
      CRON_SECRET: ci-test-cron-secret
      BROWSER_WORKER_TOKEN: ci-test-browser-worker-token
      RATE_LIMIT_DURABLE: "false"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Security tests
        run: npm run test:security

      - name: Production build
        run: npm run build

      - name: Secret scan
        run: |
          ! rg -n "(password|secret|api[_-]?key)\s*[:=]\s*['\"][^'\"]{8,}" --glob '!node_modules/**' --glob '!.github/**' --glob '!docs/**' || (echo "Potential secret found" && exit 1)

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true
